<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mon Français">
<meta name="theme-color" content="#0c0e14">
<title>Mon Français — by Soft Landings</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>button,input{touch-action:manipulation;-webkit-tap-highlight-color:transparent}html{-webkit-text-size-adjust:100%}</style>
<style>
:root {
  --bg: #0c0e14;
  --surface: #161a26;
  --surface2: #1e222e;
  --surface3: #262b3a;
  --border: rgba(201,168,124,0.08);
  --border2: rgba(201,168,124,0.18);
  --text: #e8e6e3;
  --text2: #8a8d98;
  --text3: #5e5c6e;
  --blue: #c9a87c;
  --blue-dim: rgba(201,168,124,0.15);
  --green: #6bcb77;
  --green-dim: rgba(107,203,119,0.15);
  --purple: #b983ff;
  --purple-dim: rgba(185,131,255,0.15);
  --amber: #ffa36c;
  --amber-dim: rgba(255,163,108,0.15);
  --coral: #ff6b9d;
  --coral-dim: rgba(255,107,157,0.15);
  --teal: #4ecdc4;
  --teal-dim: rgba(78,205,196,0.15);
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── LAYOUT ── */
.app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* TOP NAV */
.topnav {
  display: flex; align-items: center; gap: 0;
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 1.5rem; height: 52px; flex-shrink: 0;
}
.brand { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); margin-right: 2rem; white-space: nowrap; }
.brand span { color: var(--blue); font-style: italic; }
.nav-tabs { display: flex; gap: 2px; flex: 1; overflow-x: auto; }
.nav-tab {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 14px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; color: var(--text2);
  cursor: pointer; border: none; background: none;
  white-space: nowrap; transition: all 0.15s; font-family: 'Inter', sans-serif;
}
.nav-tab:hover { background: var(--surface2); color: var(--text); }
.nav-tab.active { background: var(--surface3); color: var(--text); }
.nav-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* CONTENT AREA */
.content { flex: 1; overflow-y: auto; padding: 1.5rem; }

/* ── SCREEN: SCHEDULE ── */
.schedule-grid { display: grid; grid-template-columns: 1fr 340px; gap: 1.25rem; }

.week-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
.week-title { font-family: 'Playfair Display', serif; font-size: 22px; }
.week-nav-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text2); cursor: pointer; padding: 4px 11px; font-size: 13px;
  font-family: 'Inter', sans-serif; transition: all 0.15s;
}
.week-nav-btn:hover { background: var(--surface3); color: var(--text); }
.week-label { font-size: 13px; color: var(--text2); flex: 1; text-align: center; }

.week-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 1.25rem; }
.day-chip {
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 9px 4px; text-align: center; cursor: pointer;
  transition: all 0.15s; background: var(--surface);
}
.day-chip:hover { border-color: var(--border2); background: var(--surface2); }
.day-chip.today { border-color: var(--blue); }
.day-chip.selected { background: var(--blue); border-color: var(--blue); }
.day-chip .dc-name { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
.day-chip.selected .dc-name { color: rgba(255,255,255,0.6); }
.day-chip .dc-num { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.4; }
.day-chip.selected .dc-num { color: #fff; }
.day-chip .dc-pips { display: flex; justify-content: center; gap: 2px; margin-top: 5px; min-height: 5px; }
.pip { width: 4px; height: 4px; border-radius: 50%; }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.25rem; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.stat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.stat-val { font-size: 21px; font-weight: 600; color: var(--text); }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

.day-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.dp-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.dp-title { font-family: 'Playfair Display', serif; font-size: 17px; }
.dp-progress { display: flex; align-items: center; gap: 8px; }
.dp-bar-wrap { width: 100px; height: 3px; background: var(--surface3); border-radius: 2px; }
.dp-bar { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.3s; }
.dp-pct { font-size: 12px; color: var(--text2); min-width: 28px; text-align: right; }

.task-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 11px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.1s;
}
.task-item:last-child { border-bottom: none; }
.task-item:hover { background: var(--surface2); }
.task-item.done .task-name { text-decoration: line-through; color: var(--text3); }
.task-check {
  width: 17px; height: 17px; border-radius: 50%; border: 1.5px solid var(--text3);
  flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.task-item.done .task-check { background: var(--green); border-color: var(--green); }
.task-check-inner { display: none; width: 6px; height: 6px; border-radius: 50%; background: var(--bg); }
.task-item.done .task-check-inner { display: block; }
.task-body { flex: 1; min-width: 0; }
.task-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.task-name { font-size: 13px; font-weight: 500; color: var(--text); }
.task-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; letter-spacing: 0.03em; flex-shrink: 0; }
.badge-vocab { background: var(--blue-dim); color: var(--blue); }
.badge-grammar { background: var(--purple-dim); color: var(--purple); }
.badge-speaking { background: var(--green-dim); color: var(--green); }
.badge-verbs { background: var(--coral-dim); color: var(--coral); }
.badge-listen { background: var(--amber-dim); color: var(--amber); }
.badge-review { background: rgba(255,255,255,0.07); color: var(--text2); }
.task-desc { font-size: 11px; color: var(--text3); margin-top: 2px; line-height: 1.5; }
.task-time { font-size: 11px; color: var(--text3); flex-shrink: 0; margin-top: 2px; }
.task-launch { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--blue); font-size: 10px; padding: 2px 8px; cursor: pointer; margin-left: 4px; font-family: 'Inter', sans-serif; transition: background 0.15s; white-space: nowrap; }
.task-launch:hover { background: var(--blue-dim); }

/* RIGHT SIDEBAR */
.sidebar { display: flex; flex-direction: column; gap: 1rem; }
.sidebar-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.1rem; }
.sc-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.8rem; }

.streak-display { display: flex; align-items: baseline; gap: 8px; }
.streak-num { font-size: 36px; font-weight: 600; color: var(--amber); }
.streak-lbl { font-size: 13px; color: var(--text2); }

.weekly-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.wg-cell { aspect-ratio: 1; border-radius: 4px; }

.notes-box {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 12px; padding: 9px 11px; resize: vertical; min-height: 80px; outline: none;
  transition: border-color 0.15s;
}
.notes-box:focus { border-color: var(--border2); }

/* ── PRACTICE SCREENS ── */
.practice-screen { max-width: 680px; margin: 0 auto; }
.ps-header { margin-bottom: 1.5rem; }
.ps-title { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 4px; }
.ps-sub { font-size: 13px; color: var(--text2); }

.card-area {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 2rem; text-align: center; min-height: 200px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin-bottom: 1rem; cursor: pointer; transition: border-color 0.15s;
}
.card-area:hover { border-color: var(--border2); }
.card-front { font-size: 28px; font-weight: 300; color: var(--text); margin-bottom: 8px; }
.card-front.french { font-family: 'Playfair Display', serif; font-style: italic; }
.card-sub { font-size: 13px; color: var(--text3); }
.card-back { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); width: 100%; }
.card-translation { font-size: 20px; color: var(--green); margin-bottom: 6px; }
.card-example { font-size: 13px; color: var(--text2); font-style: italic; }
.card-hint { font-size: 12px; color: var(--text3); margin-top: 1.5rem; }

.btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.btn {
  padding: 9px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); font-family: 'Inter', sans-serif;
  transition: all 0.15s; color: var(--text); background: var(--surface2);
}
.btn:hover { background: var(--surface3); border-color: var(--border2); }
.btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-good { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.btn-hard { background: var(--coral-dim); border-color: var(--coral); color: var(--coral); }
.btn-ok { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }

.progress-bar-wrap { background: var(--surface2); border-radius: 4px; height: 6px; margin-bottom: 1.5rem; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; background: var(--blue); }

/* Grammar drill */
.question-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.75rem; margin-bottom: 1rem; }
.q-topic-badge { display: inline-block; font-size: 10px; padding: 3px 10px; border-radius: 20px; font-weight: 600; margin-bottom: 12px; }
.q-text { font-size: 15px; color: var(--text); margin-bottom: 6px; line-height: 1.6; }
.q-english { font-size: 12px; color: var(--text3); font-style: italic; margin-bottom: 1.25rem; }
.q-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.q-option {
  padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  font-size: 13px; cursor: pointer; text-align: left; background: var(--surface2);
  color: var(--text); font-family: 'Inter', sans-serif; transition: all 0.15s;
}
.q-option:hover { border-color: var(--border2); background: var(--surface3); }
.q-option.correct { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.q-option.wrong { background: var(--coral-dim); border-color: var(--coral); color: var(--coral); }
.q-explanation { margin-top: 1rem; padding: 10px 14px; background: var(--surface2); border-radius: var(--radius-sm); font-size: 12px; color: var(--text2); line-height: 1.6; }

/* Speaking */
.speaking-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; margin-bottom: 1rem; }
.speak-english { font-size: 22px; font-weight: 300; color: var(--text); margin-bottom: 8px; }
.speak-tense-badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-bottom: 1.5rem; }
.speak-reveal { padding: 1rem; background: var(--surface2); border-radius: var(--radius-sm); margin-top: 1rem; }
.speak-french { font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; color: var(--green); }
.speak-breakdown { font-size: 12px; color: var(--text3); margin-top: 6px; }

/* Verb table */
.verb-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.verb-table th { text-align: left; padding: 8px 12px; color: var(--text3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; border-bottom: 1px solid var(--border); }
.verb-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
.verb-table tr:last-child td { border-bottom: none; }
.verb-table .pronoun { color: var(--text3); }
.verb-table .conjugated { color: var(--text); font-weight: 500; }
.verb-table input.fill {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px;
  padding: 4px 8px; width: 140px; outline: none;
}
.verb-table input.fill:focus { border-color: var(--blue); }
.verb-table input.fill.correct { border-color: var(--green); color: var(--green); }
.verb-table input.fill.wrong { border-color: var(--coral); color: var(--coral); }

/* Tabs within practice */
.pt-tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px; }
.pt-tab {
  flex: 1; padding: 7px 10px; border-radius: 6px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: none; background: none; color: var(--text2);
  font-family: 'Inter', sans-serif; transition: all 0.15s; text-align: center;
}
.pt-tab.active { background: var(--surface3); color: var(--text); }

/* Verb selector */
.verb-selector { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.verb-pill {
  padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); background: var(--surface2);
  color: var(--text2); font-family: 'Inter', sans-serif; transition: all 0.15s;
}
.verb-pill:hover { border-color: var(--border2); color: var(--text); }
.verb-pill.active { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }

/* Tense selector */
.tense-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 1.25rem; }
.tense-pill {
  padding: 8px 10px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); background: var(--surface2);
  color: var(--text2); font-family: 'Inter', sans-serif; transition: all 0.15s; text-align: center;
}
.tense-pill:hover { border-color: var(--border2); color: var(--text); }
.tense-pill.active { background: var(--purple-dim); border-color: var(--purple); color: var(--purple); }

/* Glossary / vocab list */
.vocab-row { display: flex; align-items: baseline; gap: 10px; padding: 8px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
.vocab-row:last-child { border-bottom: none; }
.vocab-french { color: var(--text); font-weight: 500; min-width: 140px; }
.vocab-english { color: var(--text2); flex: 1; }
.vocab-type { font-size: 10px; color: var(--text3); padding: 1px 6px; border: 1px solid var(--border); border-radius: 4px; white-space: nowrap; }

/* AI status */
.ai-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text3); margin-bottom: 1rem; }
.ai-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.ai-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Loading overlay */
.loading-card { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; gap: 12px; color: var(--text2); font-size: 14px; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* API key prompt */
.api-setup { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
.api-setup input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; padding: 9px 12px;
  outline: none; margin: 8px 0 10px;
}
.api-setup input:focus { border-color: var(--blue); }

/* Vocab timer bar */
.vocab-timer-bar { height: 4px; border-radius: 2px; background: var(--green); transition: width linear; }
.vocab-timer-bar.urgent { background: var(--coral); }
/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

/* ── MOBILE / iPHONE ── */
/* Fix iOS Safari 100vh bug — use dvh where supported */
.app { height: 100vh; height: 100dvh; }

@media (max-width: 900px) {
  .schedule-grid { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 640px) {
  /* Nav — collapse brand, make tabs scrollable */
  .topnav { padding: 0 0.75rem; gap: 0; }
  .brand { font-size: 15px; margin-right: 0.75rem; }
  .nav-tabs { gap: 1px; }
  .nav-tab { padding: 5px 10px; font-size: 11px; gap: 5px; }
  .nav-dot { width: 6px; height: 6px; }

  /* Content padding */
  .content { padding: 1rem 0.75rem 2rem; }

  /* Schedule */
  .week-header { flex-wrap: wrap; gap: 6px; }
  .week-title { font-size: 18px; width: 100%; }
  .week-nav-btn { padding: 5px 12px; font-size: 12px; }
  .week-label { font-size: 11px; }
  .week-strip { gap: 4px; }
  .day-chip { padding: 7px 2px; }
  .dc-num { font-size: 14px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .stat-val { font-size: 18px; }
  .task-item { padding: 10px 12px; gap: 10px; }
  .task-name { font-size: 13px; }
  .task-desc { font-size: 11px; }

  /* Practice screens */
  .practice-screen { max-width: 100%; }
  .ps-title { font-size: 20px; }
  .ps-sub { font-size: 12px; }

  /* Speaking */
  .speaking-card { padding: 1.25rem 1rem; }
  .speak-english { font-size: 18px; }
  .speak-french { font-size: 18px; }

  /* Grammar — single column options on small screens */
  .q-options { grid-template-columns: 1fr; }
  .q-option { padding: 12px 14px; font-size: 14px; } /* bigger tap targets */
  .question-card { padding: 1.25rem 1rem; }

  /* Verb table inputs */
  .verb-table input.fill { width: 120px; font-size: 14px; padding: 6px 8px; }
  .verb-table td { padding: 10px 10px; } /* bigger tap rows */

  /* Tense grid — 2 cols on mobile */
  .tense-grid { grid-template-columns: repeat(2, 1fr); }
  .tense-pill { padding: 10px 8px; font-size: 12px; }

  /* Verb pills wrap nicely */
  .verb-selector { gap: 6px; }
  .verb-pill { padding: 7px 14px; font-size: 13px; }

  /* Buttons — bigger tap targets */
  .btn { padding: 11px 18px; font-size: 13px; }
  .btn-row { gap: 6px; }

  /* Day panel */
  .dp-header { padding: 12px; }
  .dp-title { font-size: 15px; }
  .dp-bar-wrap { width: 80px; }

  /* Card area */
  .card-area { padding: 1.25rem 1rem; min-height: 160px; }
  .card-front { font-size: 22px; }

  /* Vocab list */
  .vocab-french { min-width: 110px; font-size: 13px; }
  .vocab-english { font-size: 12px; }

  /* Pt-tabs */
  .pt-tabs { gap: 2px; padding: 3px; }
  .pt-tab { padding: 7px 6px; font-size: 11px; }
}

/* Safe area insets for iPhone notch/home bar */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .content { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom)); }
  .topnav { padding-left: max(1.5rem, env(safe-area-inset-left)); padding-right: max(0.75rem, env(safe-area-inset-right)); }
}
</style>
</head>
<body>
<div class="app">
  <nav class="topnav">
    <div class="brand">mon <span>français</span> <span style="font-size:11px;color:#8a8d98;font-weight:400;margin-left:8px;font-style:normal;letter-spacing:1px;text-transform:uppercase">by Soft Landings</span></div>
    <div class="nav-tabs" id="navTabs"></div>
  </nav>
  <div class="content" id="content"></div>
</div>

<script>
// ═══════════════════════════════════════
// GLOBAL STATE
// ═══════════════════════════════════════
let activeTab = 'schedule';
let weekOffset = 0;
let today = new Date(); today.setHours(0,0,0,0);
let selectedDate = new Date(today);

function renderNav() {
  const c = document.getElementById('navTabs');
  c.innerHTML = TABS.map(t => `
    <button class="nav-tab ${activeTab===t.id?'active':''}" onclick="switchTab('${t.id}')">
      <span class="nav-dot" style="background:${t.dot}"></span>${t.label}

}

function switchTab(id) { activeTab = id; renderNav(); renderContent(); if (id === 'vocab') vocabMaybeGenerate(); }

function renderContent() {
  const c = document.getElementById('content');
  if (activeTab === 'schedule') c.innerHTML = renderScheduleHTML();
  else if (activeTab === 'vocab') c.innerHTML = renderVocabHTML();
  else if (activeTab === 'speaking') c.innerHTML = renderSpeakingHTML();
  else if (activeTab === 'grammar') c.innerHTML = renderGrammarHTML();
  else if (activeTab === 'verbs') c.innerHTML = renderVerbsHTML();
  else if (activeTab === 'reading') c.innerHTML = renderReadingHTML();
  else if (activeTab === 'review') c.innerHTML = renderReviewHTML();
  bindEvents();
}

function getWeekStart(offset) {
  let d = new Date(today); d.setDate(d.getDate() - d.getDay() + offset * 7); return d;
}

function calcStreak() {
  let streak = 0, check = new Date(today);
  for (let i = 0; i < 365; i++) {
    const tasks = getTasksForDate(check);
    const ds = state[dateKey(check)] || {};
    const done = tasks.filter(t => ds[t.id]).length;
    if (done >= Math.ceil(tasks.length / 2)) { streak++; check.setDate(check.getDate()-1); }
    else break;
  }
  return streak;
}

function renderScheduleHTML() {
  const ws = getWeekStart(weekOffset);
  const we = new Date(ws); we.setDate(we.getDate()+6);
  const key = dateKey(selectedDate);
  const tasks = getTasksForDate(selectedDate);
  const ds = state[key] || {};
  const done = tasks.filter(t => ds[t.id]).length;
  const pct = Math.round(done / tasks.length * 100);

  // week strip
  let stripHTML = '';
  const pipColors = ['#4f8ef7','#3ecf8e','#a78bfa','#f97066','#f5a623'];
  for (let i = 0; i < 7; i++) {
    let d = new Date(ws); d.setDate(d.getDate()+i);
    const dk = dateKey(d);
    const dayTasks = getTasksForDate(d);
    const dayDs = state[dk] || {};
    const isToday = dk === dateKey(today);
    const isSel = dk === dateKey(selectedDate);
    const pips = dayTasks.map((t,j) => {
      const filled = !!dayDs[t.id];
      return `<div class="pip" style="background:${filled?pipColors[j%pipColors.length]:'rgba(255,255,255,0.1)'}"></div>`;
    }).join('');
    stripHTML += `<div class="day-chip ${isToday?'today':''} ${isSel?'selected':''}" onclick="selectDay('${dk}')">
      <div class="dc-name">${DAYS_SHORT[d.getDay()]}</div>
      <div class="dc-num">${d.getDate()}</div>
      <div class="dc-pips">${pips}</div>
    </div>`;
  }

  // weekly completion grid (last 5 weeks)
  let wgHTML = '';
  for (let w = 4; w >= 0; w--) {
    for (let d2 = 0; d2 < 7; d2++) {
      let dd = new Date(today); dd.setDate(dd.getDate() - dd.getDay() - w*7 + d2);
      const dayT = getTasksForDate(dd);
      const dayD = state[dateKey(dd)] || {};
      const donePct = dayT.filter(t=>dayD[t.id]).length / dayT.length;
      const alpha = donePct === 0 ? 0.05 : donePct < 0.5 ? 0.3 : donePct < 1 ? 0.6 : 1;
      wgHTML += `<div class="wg-cell" style="background:rgba(79,142,247,${alpha})" title="${dateKey(dd)}: ${Math.round(donePct*100)}%"></div>`;
    }
  }

  // task list
  let taskHTML = '';
  tasks.forEach(t => {
    const isDone = !!ds[t.id];
    const launchBtn = t.tab ? `<button class="task-launch" onclick="event.stopPropagation();switchTab('${t.tab}')">Open →</button>` : '';
    taskHTML += `<div class="task-item ${isDone?'done':''}" onclick="toggleTask('${t.id}')">
      <div class="task-check"><div class="task-check-inner"></div></div>
      <div class="task-body">
        <div class="task-name-row">
          <span class="task-name">${t.name}</span>
          <span class="task-badge badge-${t.badge}">${t.badgeLabel}</span>
          ${launchBtn}
        </div>
        <div class="task-desc">${t.desc}</div>
      </div>
      <div class="task-time">${t.time}</div>
    </div>`;
  });

  const panelTitle = dateKey(selectedDate) === dateKey(today)
    ? `Today — ${DAYS_SHORT[selectedDate.getDay()]}, ${MONTHS_SHORT[selectedDate.getMonth()]} ${selectedDate.getDate()}`
    : `${DAYS_SHORT[selectedDate.getDay()]}, ${MONTHS_SHORT[selectedDate.getMonth()]} ${selectedDate.getDate()}`;

  // week stats
  let weekDone=0, weekTotal=0;
  for (let i=0;i<7;i++) { let d=new Date(ws);d.setDate(d.getDate()+i); const dt=getTasksForDate(d); weekTotal+=dt.length; weekDone+=dt.filter(t=>(state[dateKey(d)]||{})[t.id]).length; }
  const weekPct = weekTotal ? Math.round(weekDone/weekTotal*100) : 0;
  let todayMins = 0; tasks.forEach(t => { if(ds[t.id]) { const m=parseInt(t.time)||0; todayMins+=m; } });

  return `<div class="schedule-grid">
    <div>
      <div class="week-header">
        <div class="week-title">Planning de la semaine</div>
        <button class="week-nav-btn" onclick="changeWeek(-1)">← prev</button>
        <div class="week-label">${MONTHS_SHORT[ws.getMonth()]} ${ws.getDate()} – ${MONTHS_SHORT[we.getMonth()]} ${we.getDate()}</div>
        <button class="week-nav-btn" onclick="changeWeek(1)">next →</button>
      </div>
      <div class="week-strip">${stripHTML}</div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-lbl">Today</div><div class="stat-val">${done}/${tasks.length}</div><div class="stat-sub">tasks done</div></div>
        <div class="stat-card"><div class="stat-lbl">This week</div><div class="stat-val">${weekPct}%</div><div class="stat-sub">completion</div></div>
        <div class="stat-card"><div class="stat-lbl">Streak</div><div class="stat-val" style="color:var(--amber)">${calcStreak()}</div><div class="stat-sub">days in a row</div></div>
        <div class="stat-card"><div class="stat-lbl">Minutes</div><div class="stat-val">${todayMins}</div><div class="stat-sub">done today</div></div>
      </div>
      <div class="day-panel">
        <div class="dp-header">
          <div class="dp-title">${panelTitle}</div>
          <div class="dp-progress">
            <div class="dp-bar-wrap"><div class="dp-bar" style="width:${pct}%"></div></div>
            <div class="dp-pct">${pct}%</div>
          </div>
        </div>
        ${taskHTML}
      </div>
    </div>
    <div class="sidebar">
      <div class="sidebar-card">
        <div class="sc-title">Current streak</div>
        <div class="streak-display">
          <div class="streak-num">${calcStreak()}</div>
          <div class="streak-lbl">days</div>
        </div>
      </div>
      <div class="sidebar-card">
        <div class="sc-title">5-week activity</div>
        <div class="weekly-grid">${wgHTML}</div>
      </div>
      <div class="sidebar-card">
        <div class="sc-title">Notes du jour</div>
        <textarea class="notes-box" id="notesBox" placeholder="New words, grammar notes, things to revisit…">${(state[key]||{})._notes||''}</textarea>
      </div>
      <div class="sidebar-card">
        <div class="sc-title">Weekly focus</div>
        <div style="font-size:12px;color:var(--text2);line-height:1.7">
          <div style="margin-bottom:4px"><span style="color:var(--blue)">Mon/Wed/Fri</span> — Grammar drills</div>
          <div style="margin-bottom:4px"><span style="color:var(--coral)">Tue/Thu</span> — Verb conjugation</div>
          <div style="margin-bottom:4px"><span style="color:var(--green)">Daily</span> — Vocab SRS + Speaking</div>
          <div><span style="color:var(--amber)">Sunday</span> — Light review day</div>
        </div>
      </div>
    </div>
  </div>`;
}

function bindEvents() {
  // Start vocab timer if timed mode active
  if (activeTab === 'vocab' && vocabState.timedMode && !vocabState.revealed) {
    setTimeout(startVocabTimer, 50);
  }
  const nb = document.getElementById('notesBox');
  if (nb) {
    nb.oninput = () => {
      const key = dateKey(selectedDate);
      if (!state[key]) state[key] = {};
      state[key]._notes = nb.value;
      saveState(state);
    };
  }
}

function changeWeek(dir) { weekOffset += dir; renderContent(); }
function selectDay(dk) { selectedDate = new Date(dk + 'T00:00:00'); renderContent(); }
function toggleTask(tid) {
  const key = dateKey(selectedDate);
  if (!state[key]) state[key] = {};
  state[key][tid] = !state[key][tid];
  saveState(state);
  renderContent();
}

const VOCAB_STORE_KEY = 'fpl_vocab_bank_v2';
const VOCAB_GEN_KEY   = 'fpl_vocab_gen_v2';   // tracks generation progress

function vocabLoadBank() {
  try {
    const raw = localStorage.getItem(VOCAB_STORE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function vocabSaveBank(bank) {
  try { localStorage.setItem(VOCAB_STORE_KEY, JSON.stringify(bank)); } catch(e) { console.warn('Storage full', e); }
}
function vocabLoadGen() {
  try { return JSON.parse(localStorage.getItem(VOCAB_GEN_KEY) || '{"batch":0,"done":false}'); } catch { return {batch:0,done:false}; }
}
function vocabSaveGen(g) { try { localStorage.setItem(VOCAB_GEN_KEY, JSON.stringify(g)); } catch {} }

// Initialise bank from seed on very first load
function vocabInitBank() {
  let bank = vocabLoadBank();
  if (!bank) {
    bank = ANKI_SEED.map((w, i) => ({ ...w, id: 'seed_' + i }));
    vocabSaveBank(bank);
  }
  return bank;
}

let vocabGenerating = false;
let vocabBank = vocabInitBank();

// Repair truncated JSON arrays — salvage all complete objects before cutoff
function repairJsonArray(text) {
  // Try clean parse first
  try { return JSON.parse(text); } catch {}
  // Find last complete object (ends with }) then close the array
  const lastClose = text.lastIndexOf('}');
  if (lastClose === -1) return [];
  const trimmed = text.slice(0, lastClose + 1) + ']';
  // Remove any trailing comma before the ]
  const fixed = trimmed.replace(/,\s*]$/, ']');
  try { return JSON.parse(fixed); } catch { return []; }
}

async function vocabGenerateBatch() {
  if (vocabGenerating) return;
  const gen = vocabLoadGen();
  if (gen.done || gen.batch >= VOCAB_BATCHES.length) return;

  vocabGenerating = true;
  const batch = VOCAB_BATCHES[gen.batch];
  // Only send last 20 french words to avoid prompt bloat
  const existing = vocabBank.slice(-20).map(w => w.french).join(', ');

  const prompt = `You are building a French vocabulary learning database. Generate exactly 100 French words/phrases for frequency band ${batch.band}, focusing on: ${batch.cats}.

Rules:
- Include the article for nouns (le/la/l'/les/un/une)
- Mix word types: nouns, verbs, adjectives, adverbs, expressions
- Every word must be genuinely useful in everyday spoken French
- Do NOT duplicate these recent entries: ${existing}
- Keep example sentences short (under 10 words)

Respond ONLY with a JSON array, no markdown, no explanation:
[{"french":"le pain","english":"bread","type":"nm","example":"Je mange du pain le matin.","rank":${batch.band.split('-')[0]}},...]`;

  try {
    const res = await fetch(ANTHROPIC_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 8000, messages: [{ role: 'user', content: prompt }] })
    });

    // Surface API-level errors clearly
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(`API ${res.status}: ${err?.error?.message || res.statusText}`);
    }

    const data = await res.json();

    // Check for server-side error in response body
    if (data.error) throw new Error(data.error.message || 'API error');

    const text = (data.content?.[0]?.text || '').replace(/```json|```/g, '').trim();
    const words = repairJsonArray(text);

    if (words.length === 0) throw new Error('No valid words parsed');

    // Deduplicate against existing bank
    const existingFrench = new Set(vocabBank.map(w => w.french.toLowerCase()));
    const newWords = words
      .filter(w => w.french && w.english && !existingFrench.has(w.french.toLowerCase()))
      .map((w, i) => ({ ...w, id: `gen_${gen.batch}_${i}` }));

    vocabBank = [...vocabBank, ...newWords];
    vocabSaveBank(vocabBank);

    // Success — advance batch and reset retry counter
    gen.batch++;
    gen.retries = 0;
    if (gen.batch >= VOCAB_BATCHES.length) gen.done = true;
    vocabSaveGen(gen);

    if (activeTab === 'vocab') renderContent();

  } catch (e) {
    // Track retries per batch — skip after 3 failures to avoid getting stuck
    gen.retries = (gen.retries || 0) + 1;
    const isServerError = e.message && (e.message.includes('500') || e.message.includes('Internal server') || e.message.includes('overloaded'));
    const maxRetries = isServerError ? 5 : 3;

    if (gen.retries >= maxRetries) {
      console.warn(`Vocab batch ${gen.batch} failed ${gen.retries}x, skipping:`, e.message);
      gen.batch++;
      gen.retries = 0;
      if (gen.batch >= VOCAB_BATCHES.length) gen.done = true;
    } else {
      console.warn(`Vocab batch ${gen.batch} failed (attempt ${gen.retries}/${maxRetries}):`, e.message);
    }
    vocabSaveGen(gen);
    if (activeTab === 'vocab') renderContent();
  }
  vocabGenerating = false;

  // Auto-continue next batch only on success (retries=0) and not done
  const genState = vocabLoadGen();
  if (!genState.done && genState.retries === 0) {
    setTimeout(vocabGenerateBatch, 1500);
  }
}

// ── SRS helpers ─────────────────────────────────────────────────
let vocabState = { cardIndex: 0, revealed: false, filter: 'due', search: '', timedMode: false, timerExpired: false };

function getVocabSRS(id) {
  const s = state._vocab2 || {};
  return s[id] || { interval: 1, ef: 2.5, due: 0, seen: 0 };
}
function setVocabSRS(id, data) {
  if (!state._vocab2) state._vocab2 = {};
  state._vocab2[id] = data;
  saveState(state);
}

const NEW_CARDS_PER_DAY = 20;

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

// Returns {count, ids} for today — ids are words introduced today but not yet rated
function getTodayNewCards() {
  const s = state._vocab_daily || {};
  const rec = s[getTodayKey()];
  if (!rec) return { count: 0, ids: new Set() };
  // Support both old format (number) and new format ({count, ids})
  if (typeof rec === 'number') return { count: rec, ids: new Set() };
  return { count: rec.count || 0, ids: new Set(rec.ids || []) };
}

function getNewCardsSeenToday() {
  return getTodayNewCards().count;
}

function recordNewCardSeen(wordId) {
  if (!state._vocab_daily) state._vocab_daily = {};
  const key = getTodayKey();
  const current = getTodayNewCards();
  current.count++;
  current.ids.add(wordId);
  // Store as object with count + ids array
  state._vocab_daily[key] = { count: current.count, ids: [...current.ids] };
  // Clean up old day keys
  Object.keys(state._vocab_daily).forEach(k => { if (k !== key) delete state._vocab_daily[k]; });
  saveState(state);
}

function getVocabDeck() {
  const now = Date.now();
  const srsData = state._vocab2 || {};
  const todayNew = getTodayNewCards();
  const newSlotsLeft = Math.max(0, NEW_CARDS_PER_DAY - todayNew.count);

  // Reviews: cards already rated whose due date has passed
  const reviews = vocabBank
    .filter(w => srsData[w.id] && srsData[w.id].due <= now)
    .map(w => ({ ...w, srs: getVocabSRS(w.id), isNew: false }))
    .sort((a, b) => a.srs.due - b.srs.due);

  // Today's already-introduced cards that haven't been rated yet
  // (introduced earlier today but session closed before rating)
  const pendingToday = newSlotsLeft > 0 ? [] : vocabBank
    .filter(w => todayNew.ids.has(w.id) && !srsData[w.id])
    .map(w => ({ ...w, srs: getVocabSRS(w.id), isNew: true }));

  // Brand new cards: never seen AND not introduced today, up to remaining slots
  const alreadyIntroduced = new Set([...Object.keys(srsData), ...todayNew.ids]);
  const newCards = newSlotsLeft > 0
    ? vocabBank
        .filter(w => !alreadyIntroduced.has(w.id))
        .slice(0, newSlotsLeft)
        .map(w => ({ ...w, srs: getVocabSRS(w.id), isNew: true }))
    : [];

  // Reviews first, then pending today's unrated cards, then fresh new cards
  return [...reviews, ...pendingToday, ...newCards];
}

function getVocabStats() {
  const total = vocabBank.length;
  const srsData = state._vocab2 || {};
  const seen = Object.keys(srsData).length;
  const mastered = Object.values(srsData).filter(s => s.interval >= 7).length;
  const gen = vocabLoadGen();
  const newSeenToday = getNewCardsSeenToday();
  const newSlotsLeft = Math.max(0, NEW_CARDS_PER_DAY - newSeenToday);
  return { total, seen, mastered, genBatch: gen.batch, genDone: gen.done, newSeenToday, newSlotsLeft };
}

let _vocabTimerHandle = null;
function revealVocab() {
  vocabState.revealed = true;
  vocabState.timerExpired = false;
  if (_vocabTimerHandle) { clearTimeout(_vocabTimerHandle); _vocabTimerHandle = null; }
  renderContent();
  const deck = getVocabDeck();
  const card = deck[vocabState.cardIndex % deck.length];
  if (card?.french) setTimeout(() => speakFrench(card.french), 300);
}

function startVocabTimer() {
  if (!vocabState.timedMode || vocabState.revealed) return;
  if (_vocabTimerHandle) clearTimeout(_vocabTimerHandle);
  const bar = document.getElementById('vocabTimerBar');
  if (!bar) return;
  // Animate bar draining over 8s
  bar.style.transition = 'width 8s linear';
  bar.style.width = '0%';
  _vocabTimerHandle = setTimeout(() => {
    vocabState.timerExpired = true;
    bar.classList.add('urgent');
    // Auto-reveal after timer expires
    revealVocab();
  }, 8000);
}

function rateVocab2(rating) {
  const deck = getVocabDeck();
  const card = deck[vocabState.cardIndex % deck.length];
  if (!card) return;

  // Track new card introduction — store the word ID so we don't re-introduce it tomorrow
  if (card.isNew) recordNewCardSeen(card.id);

  const s = getVocabSRS(card.id);
  let { interval, ef, seen } = { interval: s.interval || 1, ef: s.ef || 2.5, seen: s.seen || 0 };

  // SM-2 algorithm
  // New card (seen=0): Graduate immediately based on rating
  // Learning card (seen=1): Short interval before full SRS
  // Review card (seen>=2): Full SM-2 interval multiplication
  if (rating === 1) {
    // Again — reset to 1 day regardless of stage
    interval = 1;
    ef = Math.max(1.3, ef - 0.2);
  } else if (rating === 2) {
    // Hard
    if (seen === 0) interval = 1;
    else if (seen === 1) interval = 2;
    else interval = Math.max(2, Math.round(interval * 1.2));
    ef = Math.max(1.3, ef - 0.15);
  } else if (rating === 3) {
    // Good
    if (seen === 0) interval = 3;
    else if (seen === 1) interval = 5;
    else interval = Math.max(3, Math.round(interval * ef));
    // ef unchanged on Good — neutral per SM-2
  } else {
    // Easy — graduate quickly
    if (seen === 0) interval = 5;
    else if (seen === 1) interval = 8;
    else interval = Math.max(5, Math.round(interval * ef * 1.3));
    ef = Math.min(3.0, ef + 0.15);
  }

  setVocabSRS(card.id, { interval, ef, due: Date.now() + interval * 86400000, seen: seen + 1 });
  vocabState = { ...vocabState, cardIndex: 0, revealed: false };
  renderContent();
}

function startAddNew() { vocabState.addMode = true; renderContent(); }

// Kick off generation silently on vocab tab open if not done
function vocabForceResume() {
  // Reset stuck state then kick off generation
  vocabGenerating = false;
  const gen = vocabLoadGen();
  gen.retries = 0;
  vocabSaveGen(gen);
  if (activeTab === 'vocab') renderContent();
  setTimeout(vocabGenerateBatch, 100);
}

function vocabMaybeGenerate() {
  const gen = vocabLoadGen();
  if (!gen.done && !vocabGenerating) {
    setTimeout(vocabGenerateBatch, 1500);
  }
}

function speakFrench(text) {
  if (!text) return;
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'fr-FR'; utterance.rate = 0.82; utterance.pitch = 1;
  const voices = window.speechSynthesis.getVoices();
  const frVoice = voices.find(v => v.lang.startsWith('fr'));
  if (frVoice) utterance.voice = frVoice;
  window.speechSynthesis.cancel();

  speakState.loading = true; speakState.sentence = null; speakState.revealed = false;

  const prevEnglish = (state._speak_history || []).slice(-8).map(h=>h.english).join(' | ');

  const prompt = `You are a French language teacher creating sentences for speaking practice.

Generate ONE English sentence for a French learner to translate.

Topic: "${topic}"
Suggested subject: ${subject} (use this or vary it naturally)
Tense required: ${SPEAKING_TENSE_PHRASING[tenseToUse]}

- The sentence MUST use the required tense when translated to French

  try {
    const res = await fetch(ANTHROPIC_API_URL, {
      method:'POST',
      headers: { 'Content-Type': 'application/json' },
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})

    const data = await res.json();

function downloadSpeakHistory() {
  const history = (state._speak_history || []).slice().reverse();
  if (!history.length) return;

  const today = new Date().toLocaleDateString('en-GB', { year:'numeric', month:'long', day:'numeric' });
  const lines = [
    'Mon Français — Speaking Practice History',
    `Downloaded: ${today}`,
    `Total sentences: ${history.length}`,
    '',
    '──────────────────────────────────────────────────────────',
    '',
  ];

  history.forEach((h, i) => {
    const tense = h.tense === 'situation' ? 'Situation drill'
      : h.tense === 'situation_graded' ? 'Situation (graded)'
      : (SPEAKING_TENSE_NAMES[h.tense] || h.tense || '');
    lines.push(`${i + 1}. [${tense}]`);
    lines.push(`   EN: ${h.english}`);
    if (h.myAnswer) lines.push(`   MY ANSWER: ${h.myAnswer}`);
    if (h.french) lines.push(`   FR: ${h.french}`);
    else lines.push(`   FR: (not revealed)`);
    if (h.correction) lines.push(`   CORRECTION: ${h.correction}`);
    lines.push('');
  });

  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `french-speaking-practice-${new Date().toISOString().slice(0,10)}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function setSpeakTense(k) { speakState.tenseKey = k; speakState.sentence = null; speakState.revealed = false; renderContent(); }
function revealSpeaking() {
  speakState.revealed = true;
  // Update the most recent history entry with the French answer now that it's been revealed
  if (speakState.sentence?.french && state._speak_history?.length) {
    const last = state._speak_history[state._speak_history.length - 1];
    if (!last.french) { last.french = speakState.sentence.french; saveState(state); }
  }
  renderContent();
  if (speakState.sentence?.french) setTimeout(() => speakFrench(speakState.sentence.french), 350);
}
function rateSpeaking(r) {
  speakState.sessionCount = (speakState.sessionCount || 0) + 1;
  if (r === 5) speakState.speakStreak = (speakState.speakStreak || 0) + 1;
  else speakState.speakStreak = 0;
  if (!state._speak_scores) state._speak_scores = [];
  state._speak_scores.push({ tense: speakState._resolvedTense || speakState.tenseKey, score: r, ts: Date.now() });
  saveState(state);
  speakState.sentence = null; speakState.revealed = false;
  generateSentence();
}

async function explainGrammar(btn) {
  const s = speakState.sentence;

  btn.disabled = true;
  btn.textContent = '💡 Explaining…';

  const box = document.getElementById('grammarExplanation');
  if (box) {
    box.innerHTML = '<div style="display:flex;align-items:center;gap:8px;padding:10px 0;font-size:12px;color:var(--text3)"><div class="spinner"></div>Analysing the grammar…</div>';
  }

  const prompt = `You are a French grammar teacher. A student is doing speaking practice and just saw this sentence pair:

English: "${s.english}"
French: "${s.french}"
Tense: ${SPEAKING_TENSE_NAMES[s.tense || speakState._resolvedTense] || speakState.tenseKey}

Explain the key grammar points of the French sentence in a concise, practical way. Focus on:
- Why this tense is used here
- Any tricky verb forms, pronouns, word order, or agreements
- Any expressions or constructions worth noting

Keep it short — 3 to 5 bullet points max. Write for an intermediate learner. Use plain English. Where helpful, show the French element inline like this: *le leur*.

Respond ONLY with a JSON object:
{"points":["point 1","point 2","point 3"]}`;

  try {
    const res = await fetch(ANTHROPIC_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 600, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const text = (data.content?.[0]?.text || '').replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(text);
    const points = parsed.points || [];

    if (box) {
      box.innerHTML = `<div style="background:var(--blue-dim);border:1px solid var(--blue);border-radius:var(--radius-sm);padding:12px 14px;margin-top:4px">
        <div style="font-size:11px;font-weight:600;color:var(--blue);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">Grammar breakdown</div>
        ${points.map(p => `<div style="display:flex;gap:8px;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:6px">
          <span style="color:var(--blue);flex-shrink:0;margin-top:1px">→</span>
          <span>${p}</span>
        </div>`).join('')}
      </div>`;
    }
    btn.textContent = '💡 Explained';
    // Add save note button inside the explanation box
    const saveBtn = document.createElement('button');
    saveBtn.style.cssText = 'font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;font-family:Inter,sans-serif;margin-top:8px;display:block';
    saveBtn.textContent = '📌 Save note';
    saveBtn.onclick = function() {
      const noteData = { topic:'Speaking — ' + (SPEAKING_TENSE_NAMES[speakState._resolvedTense||speakState.tenseKey]||''), question: speakState.sentence?.english||'', exp: points.join(' · '), answer: speakState.sentence?.french||'' };
      saveNoteBtn(this, noteData);
    };
    if (box) box.appendChild(saveBtn);
  } catch(e) {
    if (box) box.innerHTML = '<div style="font-size:12px;color:var(--coral);padding:8px 0">Could not load explanation — try again.</div>';
    btn.disabled = false;
    btn.textContent = '💡 Explain grammar';
  }
}

// ── Speaking → Vocab word capture ──────────────────────────────
function speakWordTokens(french) {
  // Strip punctuation, split into unique meaningful tokens, skip tiny words
  const skipWords = new Set(['le','la','les','un','une','des','de','du','je','tu','il','elle','on','nous','vous','ils','elles','et','ou','à','au','aux','en','y','se','me','te','ne','pas','que','qui','quoi','ce','est','a','ai','as','ont','sont','été','avoir','être','mais','par','sur','sous','dans','avec','pour','sans','entre','vers','chez','si','car','donc','or','ni']);
  const tokens = french
    .replace(/[.,!?;:«»""'']/g, ' ')
    .split(/\s+/)
    .map(w => w.trim().toLowerCase())
    .filter(w => w.length > 2 && !skipWords.has(w));
  const unique = [...new Set(tokens)];
  // Check which are already in vocab bank
  const inBank = new Set(vocabBank.map(w => w.french.toLowerCase().replace(/^(le |la |l'|les |un |une |des )/, '')));
  return unique.map(word => {
    const saved = inBank.has(word);
    return `<button
      style="padding:5px 12px;border-radius:20px;border:1px solid ${saved ? 'var(--green)' : 'var(--border2)'};background:${saved ? 'var(--green-dim)' : 'var(--surface3)'};color:${saved ? 'var(--green)' : 'var(--text)'};font-size:13px;cursor:${saved ? 'default' : 'pointer'};font-family:Inter,sans-serif;transition:all .15s;font-style:italic"
      ${saved ? 'disabled title="Already in vocab bank"' : `onclick="speakSaveWord('${word.replace(/'/g,"\'")}',this)"`}
    >${word}${saved ? ' ✓' : ' +'}</button>`;
  }).join('');
}

function speakSaveWord(word, btn) {
  const exists = vocabBank.some(w => w.french.toLowerCase().replace(/^(le |la |l'|les |un |une |des )/, '') === word.toLowerCase());
  if (exists) return;
  const newWord = {
    id: 'speak_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    french: word, english: '(look up)', type: '?', example: '', rank: 9999,
  };
  vocabBank = [...vocabBank, newWord];
  vocabSaveBank(vocabBank);
  // Also log to personal word list
  myWordsAdd(word, '', 'Speaking practice');
  // Update button
  btn.style.borderColor = 'var(--green)';
  btn.style.background = 'var(--green-dim)';
  btn.style.color = 'var(--green)';
  btn.textContent = word + ' ✓';
  btn.disabled = true;
  const flash = document.createElement('span');
  flash.textContent = ' Saved!';
  flash.style.cssText = 'font-size:11px;color:var(--green);margin-left:6px';
  btn.parentNode.appendChild(flash);
  setTimeout(() => flash.remove(), 2000);
}

      {label:'Reporting speech',text:'il dit que (present) / il a dit que (past)',ex:[["Marie dit qu\'elle est fatiguée.","Marie says she\'s tired."],["Il a dit qu\'il voulait partir.","He said he wanted to leave."]]},
      {label:'Tense shift with past reporting verb',text:'présent → imparfait · futur → conditionnel · passé composé → plus-que-parfait',ex:[["Il a dit: \'Je suis là\' → Il a dit qu\'il était là.","présent → imparfait"]]},
      {label:'Reporting yes/no questions',text:'Use si',ex:[["Elle demande si tu viens.","She asks whether you\'re coming."]]},
      {label:'Reporting open questions',text:'Qu\'est-ce que → ce que · Qu\'est-ce qui → ce qui · Qui → qui · Où → où',ex:[["Il demande ce que tu fais.","He asks what you\'re doing."]]},
    ],
    questions:[
      {q:"Convert to indirect speech: Marie dit: \'Je suis fatiguée.\'",type:'mc',choices:["Marie dit qu\'elle est fatiguée.","Marie dit qu\'elle était fatiguée.","Marie dit qu\'il est fatigué.","Marie dit que je suis fatiguée."],answer:0,exp:"With <b>dit</b> (present), no tense shift needed: <i>Marie dit qu\'elle est fatiguée.</i> The pronoun shifts: \'je\' → \'elle\' (referring to Marie). When the reporting verb is present, the reported clause keeps its original tense."},
      {q:"Convert to indirect speech: Il a dit: \'Je veux partir.\'",type:'mc',choices:["Il a dit qu\'il veut partir.","Il a dit qu\'il voulait partir.","Il a dit qu\'il voudrait partir.","Il a dit qu\'il est parti."],answer:1,exp:"With a <b>past reporting verb</b> (il a dit), the tense shifts: présent → <b>imparfait</b>. <i>Il a dit qu\'il voulait partir.</i> — He said he wanted to leave."},
      {q:"Report this question: Elle demande: \'Est-ce que tu viens?\' → Elle demande ___ tu viens.",type:'fill',answer:"si",exp:"For <b>yes/no questions</b> in indirect speech, use <b>si</b>: <i>Elle demande si tu viens.</i> — She asks whether you\'re coming. No inversion in the reported clause."},
      {q:"How do you report: \'Il demande : Qu\'est-ce que tu fais?\'",type:'mc',choices:["Il demande ce que tu fais.","Il demande si tu fais.","Il demande qu\'est-ce que tu fais.","Il demande quoi tu fais."],answer:0,exp:"For open questions asking about things (what): <b>il demande ce que</b>. <i>Il demande ce que tu fais.</i> — He asks what you\'re doing. \'Qu\'est-ce que\' becomes \'ce que\' in indirect speech."},
      {q:"Complete: Paul a dit: \'J\'habite à Paris.\' → Paul a dit qu\'il ___ à Paris.",type:'fill',answer:"habitait",exp:"Past reporting verb (a dit) + présent → <b>imparfait</b>: habite → <b>habitait</b>. <i>Paul a dit qu\'il habitait à Paris.</i> — Paul said he lived in Paris."},
    ]

const MY_WORDS_KEY = 'fpl_my_words';
let myWordList = JSON.parse(localStorage.getItem(MY_WORDS_KEY) || '[]');

function myWordsAdd(french, english, source) {
  // Avoid duplicates by french word
  if (myWordList.some(w => w.french.toLowerCase() === french.toLowerCase())) return false;
  myWordList.unshift({ french, english: english || '', source: source || 'unknown', addedAt: Date.now() });
  localStorage.setItem(MY_WORDS_KEY, JSON.stringify(myWordList));
  return true;
}

function myWordsDelete(idx) {
  myWordList.splice(idx, 1);
  localStorage.setItem(MY_WORDS_KEY, JSON.stringify(myWordList));
  renderContent();
}

function downloadMyWords() {
  if (!myWordList.length) return;
  const today = new Date().toLocaleDateString('en-GB', {year:'numeric',month:'long',day:'numeric'});
  const lines = [
    'Mon Français — My Personal Word List',
    'Downloaded: ' + today,
    'Total words: ' + myWordList.length,
    '',
    '──────────────────────────────────────────────────────────',
    '',
  ];
  myWordList.forEach((w, i) => {
    const date = new Date(w.addedAt).toLocaleDateString('en-GB');
    lines.push((i+1) + '. ' + w.french + (w.english ? '  —  ' + w.english : ''));
    lines.push('   Source: ' + w.source + '  ·  Added: ' + date);
    lines.push('');
  });
  const blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'french-my-words-' + new Date().toISOString().slice(0,10) + '.txt';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}
function saveGrammarNote(note) {
  // Avoid exact duplicates
  if (grammarNotes.some(n => n.exp === note.exp)) return false;
  grammarNotes.unshift({ ...note, savedAt: Date.now() });
  localStorage.setItem('fpl_grammar_notes', JSON.stringify(grammarNotes));
  return true;
}
function deleteGrammarNote(idx) {
  grammarNotes.splice(idx, 1);

}
function downloadGrammarNotes() {
  if (!grammarNotes.length) return;
  const today = new Date().toLocaleDateString('en-GB', {year:'numeric',month:'long',day:'numeric'});
  const lines = ['Mon Français — Grammar Notes', `Downloaded: ${today}`, `Total notes: ${grammarNotes.length}`, '', '──────────────────────────────────────────────────────────', ''];
  grammarNotes.forEach((n, i) => {

let gState = { view:'topics', topicId:null, queue:[], qIdx:0, answered:null, sessionCorrect:0, sessionWrong:0, refOpen:{}, srsMode:false };

function gSaveScores() {
  localStorage.setItem('fpl_grammar_scores', JSON.stringify(grammarScores));
  localStorage.setItem('fpl_grammar_streak', grammarStreak);
  localStorage.setItem('fpl_grammar_srs_v2', JSON.stringify(grammarSRS));
}

function gGetSRS(qid) {
  return grammarSRS[qid] || { interval:1, ef:2.5, due:0, seen:0 };
}
function gSetSRS(qid, correct) {
  const s = gGetSRS(qid);
  let { interval, ef, seen } = s;
  if (correct) {
    interval = seen === 0 ? 3 : seen === 1 ? 7 : Math.max(3, Math.round(interval * ef));
    ef = Math.min(3.0, ef + 0.1);
  } else {
    interval = 1;
    ef = Math.max(1.3, ef - 0.2);
  }
  grammarSRS[qid] = { interval, ef, due: Date.now() + interval * 86400000, seen: seen + 1 };
  gSaveScores();
}

function gGetDueQuestions() {
  const now = Date.now();
  const due = [];
  GRAMMAR_TOPICS.forEach(t => {
    t.questions.forEach((q, i) => {
      const qid = (q.id || (t.id + '_' + i));
      const s = gGetSRS(qid);
      if (s.due <= now) due.push({ ...q, topicId: t.id, topicName: t.name, color: t.color, qIdx: i, qid });
    });
  });
  // Shuffle
  for (let i = due.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [due[i],due[j]]=[due[j],due[i]]; }
  return due;
}

function gNormalize(s) {
  return s.trim().toLowerCase().replace(/['']/g,"'").replace(/\s+/g,' ')
    .replace(/[éèêë]/g,'e').replace(/[àâä]/g,'a').replace(/[îï]/g,'i').replace(/[ôö]/g,'o').replace(/[ùûü]/g,'u').replace(/ç/g,'c');
}

function gBuildQueue(topicId) {
  const t = GRAMMAR_TOPICS.find(x=>x.id===topicId);
  const pool = t.questions.map((q,i)=>({...q,topicId,topicName:t.name,color:t.color,qIdx:i}));
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  return pool;
}

function gRecord(correct, userAnswer) {
  const q = gState.queue[gState.qIdx];
  if(!grammarScores[q.topicId]) grammarScores[q.topicId]={correct:0,total:0};
  grammarScores[q.topicId].total++;
  if(correct){ grammarScores[q.topicId].correct++; grammarStreak++; gState.sessionCorrect++; }
  else { grammarStreak=0; gState.sessionWrong++; }
  // Update SRS for this question
  if (q.qid !== undefined) gSetSRS(q.qid, correct);

  if(fp)return`ne ${fp[1]} pas ${fp[2]}`;
  const rx=form.match(/^(m'|t'|s'|me |te |se |nous |vous )(.+)/i);
  if(rx){const[,rp,rest]=rx;const ca=rest.match(/^(est|suis|es|sommes|êtes|sont|était|étais|étions|étiez|étaient|ai|as|a|avons|avez|ont) (.+)/i);if(ca)return`ne ${rp}${ca[1]} pas ${ca[2]}`;return`ne ${rp}${rest} pas`;}
  const cp=form.match(/^(ai|as|a|avons|avez|ont|suis|es|est|sommes|êtes|sont|étais|était|étions|étiez|étaient|aurais|aurait|aurions|auriez|auraient|serais|serait|serions|seriez|seraient) (.+)/i);
  if(cp){const vow=/^[aeiouéh]/i.test(cp[1]);return`${vow?"n'":"ne "}${cp[1]} pas ${cp[2]}`;}
  const vow=/^[aeiouéh]/i.test(form);return`${vow?"n'":"ne "}${form} pas`;
}
function vmBuildExamples(vb,tId){
  const conjs=vmGetConjs(vb,tId);if(!conjs||!conjs.length)return null;
  const jeForm=conjs[0];const ilForm=conjs[2];
  if(tId==='subjunctive'){const qj=/^[aeiouéh]/i.test(jeForm)?"que j'":"que je ";const qi=/^[aeiouéh]/i.test(ilForm)?"qu'":"que ";return{positive:`Il faut ${qj}${jeForm}.`,negative:`Il ne faut pas ${qi}il/elle ${ilForm}.`};}
  let pos,neg;
  if(vb.subtype==='reflexive'){pos=`Je ${jeForm}.`;neg=`Je ${vmNegateForm(jeForm)}.`;}
  else{const vow=/^[aeiouéh]/i.test(jeForm);pos=`${vow?"J'":"Je "}${jeForm}.`;neg=`Je ${vmNegateForm(jeForm)}.`;}
  return{positive:pos,negative:neg};
}

function vmStartQuiz(){
  let pool=[];
  vmVerbs.forEach(vb=>{
    if(vmState.quizFilter.group==='top10'&&!vb.top10)return;
    if(vmState.quizFilter.group!=='all'&&vmState.quizFilter.group!=='top10'&&String(vb.group)!==vmState.quizFilter.group)return;
    const tenses=vmState.quizFilter.tense==='all'?Object.keys(vb.tenses):[vmState.quizFilter.tense];
    tenses.forEach(tId=>{if(!vb.tenses[tId])return;VM_PRONOUNS.forEach((_,i)=>pool.push({verbId:vb.id,tenseId:tId,pronounIdx:i}));});
  });
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const n=vmState.quizFilter.count==='all'?pool.length:Math.min(parseInt(vmState.quizFilter.count)||10,pool.length);
  vmState.quizQueue=pool.slice(0,n);
  vmState.quizIdx=0;vmState.quizCorrect=0;vmState.quizWrong=0;vmState.missedCards=[];vmState.quizAnswered=false;
  renderContent();
  setTimeout(()=>{const inp=document.getElementById('vmQuizInput');if(inp)inp.focus();},80);
}

function vmNorm(s){return s.trim().toLowerCase().replace(/[()]/g,'').replace(/\s+/g,' ');}
function vmVariants(s){const b=s.trim().toLowerCase();return[...new Set([b,b.replace(/\(e\)s?/g,'').trim(),b.replace(/\(e\)\(s\)/g,'').trim()].map(a=>a.replace(/\s+/g,' ')))];}

function vmSubmit(){
  if(vmState.quizAnswered)return;
  const inp=document.getElementById('vmQuizInput');
  const ans=vmNorm(inp.value||'');if(!ans)return;
  const card=vmState.quizQueue[vmState.quizIdx];
  const vb=vmVerbs.find(x=>x.id===card.verbId);
  const correct=vmGetConjs(vb,card.tenseId)[card.pronounIdx];
  const isCorrect=ans===vmNorm(correct)||vmVariants(correct).some(v=>vmNorm(v)===ans);
  vmState.quizAnswered=true;
  vmState._lastCorrect=isCorrect;
  if(isCorrect){vmState.quizCorrect++;vmUpdateSRS(`${card.verbId}_${card.tenseId}_${card.pronounIdx}`,true,'easy');inp.style.borderColor='var(--green)';inp.style.color='var(--green)';}
  else{vmState.quizWrong++;vmState.missedCards.push({...card,correct});inp.style.borderColor='var(--coral)';inp.style.color='var(--coral)';}
  renderContent();
}
function vmRate(rating){
