async function generateSituation() {

  speakState.situationLoading = true;
  speakState.situationGrading = false;
  speakState.situationFeedback = null;
  speakState.situationUserAnswer = '';
  renderContent();

  // Pick a random topic to inspire a fresh AI-generated scenario
  const topic = SPEAKING_TOPICS_FULL[Math.floor(Math.random() * SPEAKING_TOPICS_FULL.length)];
  const scenarioPrompt = `Generate a realistic, everyday French conversational scenario in 1-2 sentences in English. The scenario should describe a situation involving the topic: "${topic}". It should place the reader in first person (e.g. "You are at..." or "You want to..."). Make it natural and varied. Reply with ONLY the scenario description, no extra text.`;

  try {
    // Step 1: Generate a fresh scenario via API
    const scenarioRes = await fetch(ANTHROPIC_API_URL, {
      method:'POST',
      headers: { 'Content-Type': 'application/json' },
      body:JSON.stringify({model:'claude-haiku-4-20250514',max_tokens:150,messages:[{role:'user',content:scenarioPrompt}]})
    });
    const scenarioData = await scenarioRes.json();
    const scenario = (scenarioData.content?.[0]?.text||'').trim() || SITUATIONS[Math.floor(Math.random() * SITUATIONS.length)];

    // Step 2: Generate model French response for the scenario
    const prompt = `You are a French conversation coach. Generate a natural French response for this situation:
"${scenario}"

The response should be one sentence, conversational, intermediate level.

Respond ONLY with JSON, no markdown:
{"scenario":"${scenario}","model_french":"...","model_english":"...","grammar_note":"one short note about a key structure used"}`;

    const res = await fetch(ANTHROPIC_API_URL, {
      method:'POST',
      headers: { 'Content-Type': 'application/json' },
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const text = (data.content?.[0]?.text||'').replace(/```json|```/g,'').trim();
    speakState.situation = JSON.parse(text);
    speakState.situationLoading = false;
  } catch(e) {
    // Fallback to hardcoded scenario on error
    const fallbackScenario = SITUATIONS[Math.floor(Math.random() * SITUATIONS.length)];
    speakState.situationLoading = false;
    speakState.situation = { scenario: fallbackScenario, model_french: '', model_english: '', grammar_note: '' };
  }
  renderContent();
}

async function gradeSituationAnswer() {
  const userAns = (document.getElementById('situationInput')||{}).value || '';
  if (!userAns.trim()) return;
  speakState.situationUserAnswer = userAns.trim();
  speakState.situationGrading = true;
  renderContent();

  const s = speakState.situation;
  const prompt = `A French learner was given this situation: "${s.scenario}"
They responded: "${userAns}"
A good model answer would be: "${s.model_french}"

Grade their response briefly. Focus on:
1. Did they communicate the right meaning?
2. Any grammar errors to correct?
3. How could they improve it?

Be encouraging but honest. Keep it to 2-3 sentences max.

Respond ONLY with JSON:
{"score":"good|ok|needs_work","feedback":"your feedback in English","corrected":"their sentence corrected in French (or same if already correct)"}`;

  try {
    const res = await fetch(ANTHROPIC_API_URL, {
      method:'POST',
      headers: { 'Content-Type': 'application/json' },
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const text = (data.content?.[0]?.text||'').replace(/```json|```/g,'').trim();
    speakState.situationFeedback = JSON.parse(text);
    speakState.situationGrading = false;

    // Save to history with all details
    if (!state._speak_history) state._speak_history = [];
    const fb = speakState.situationFeedback;
    state._speak_history.push({
      english: s.scenario,
      myAnswer: userAns,
      french: s.model_french,
      correction: fb.corrected !== userAns ? fb.corrected : null,
      tense: 'situation_graded'
    });
    if (state._speak_history.length > 60) state._speak_history = state._speak_history.slice(-60);
    saveState(state);
  } catch(e) {
    speakState.situationGrading = false;
    speakState.situationFeedback = { score:'ok', feedback:'Could not grade — check your connection.', corrected:userAns };
  }
  renderContent();
}

function renderSituationCard() {
  if (speakState.situationLoading) {
    return `<div class="speaking-card" style="min-height:200px">
      <div class="loading-card"><div class="spinner"></div><div style="color:var(--text2)">Generating situation…</div></div>
    </div>`;
  }
  if (!speakState.situation) {
    return `<div class="speaking-card" style="text-align:center;padding:2rem">
      <div style="font-size:15px;color:var(--text2);margin-bottom:6px">Real-world conversation scenarios</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:1.5rem">Type your response in French — Claude grades it and gives you a correction</div>
      <button class="btn btn-primary" onclick="generateSituation()">Generate situation</button>
    </div>`;
  }

  const s = speakState.situation;
  const fb = speakState.situationFeedback;
  const scoreColors = {good:'var(--green)',ok:'var(--amber)',needs_work:'var(--coral)'};
  const scoreLabels = {good:'✓ Good answer',ok:'~ Almost there',needs_work:'✗ Needs work'};

  // Feedback panel shown after grading
  const feedbackHTML = fb ? `
    <div style="margin-top:1rem;padding:14px 16px;background:var(--surface2);border-radius:var(--radius-sm);border-left:3px solid ${scoreColors[fb.score]||'var(--blue)'}">
      <div style="font-size:13px;font-weight:600;color:${scoreColors[fb.score]||'var(--blue)'};margin-bottom:8px">${scoreLabels[fb.score]||'Graded'}</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px">${fb.feedback}</div>
      ${fb.corrected && fb.corrected !== speakState.situationUserAnswer ? `
        <div style="padding:10px 12px;background:var(--surface3);border-radius:var(--radius-sm);margin-bottom:8px">
          <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Your answer corrected</div>
          <div style="font-family:'Playfair Display',serif;font-style:italic;font-size:14px;color:var(--green)">${fb.corrected}</div>
        </div>` : ''}
      <div style="padding:10px 12px;background:var(--surface3);border-radius:var(--radius-sm)">
        <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Model answer</div>
        <div style="font-family:'Playfair Display',serif;font-style:italic;font-size:14px;color:var(--blue);margin-bottom:3px">${s.model_french}</div>
        <div style="font-size:11px;color:var(--text3)">${s.model_english}</div>
        ${s.grammar_note ? `<div style="font-size:11px;color:var(--text3);font-style:italic;margin-top:4px">💡 ${s.grammar_note}</div>` : ''}
        <button data-speak="${s.model_french}" onclick="speakFrench(this.dataset.speak)"
          style="margin-top:8px;display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
          background:var(--purple-dim);border:1px solid var(--purple);color:var(--purple);
          font-size:11px;font-weight:600;font-family:Inter,sans-serif;cursor:pointer">🔊 Hear model</button>
      </div>
    </div>
    <div class="btn-row" style="margin-top:1rem">
      <button class="btn btn-primary" onclick="speakState.situation=null;speakState.situationFeedback=null;generateSituation()">Next situation →</button>
    </div>` : '';

  // Input area — shown before grading
  const inputHTML = !fb ? `
    <div style="margin-top:1rem">
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Type your French response:</div>
      <textarea id="situationInput" placeholder="Écrivez votre réponse en français…"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
        color:var(--text);font-family:'Playfair Display',serif;font-style:italic;font-size:14px;
        padding:10px 12px;resize:vertical;min-height:70px;outline:none;line-height:1.6"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();gradeSituationAnswer()}"
      >${speakState.situationUserAnswer||''}</textarea>
      <div class="btn-row" style="margin-top:8px">
        ${speakState.situationGrading
          ? `<button class="btn" disabled><div class="spinner" style="width:14px;height:14px;margin-right:6px;display:inline-block"></div>Grading…</button>`
          : `<button class="btn btn-primary" onclick="gradeSituationAnswer()">Submit for grading</button>
             <button class="btn" onclick="speakState.situation=null;speakState.situationFeedback=null;generateSituation()">Skip</button>`}
      </div>
    </div>` : '';

  return `<div class="speaking-card">
    <div style="font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);margin-bottom:12px;padding:3px 12px;display:inline-block;border-radius:20px;background:var(--teal-dim);border:1px solid rgba(45,212,191,.4)">🎭 Situation</div>
    <div style="font-size:17px;color:var(--text);line-height:1.5;margin-bottom:6px">${s.scenario}</div>
    <div style="font-size:12px;color:var(--text3);font-style:italic">How would you respond in French?</div>
    ${inputHTML}
    ${feedbackHTML}
  </div>`;
}

// ── READING TAB ─────────────────────────────────────────────────
let readingState = { article: null, loading: false, answers: {}, checked: false };

const READING_TOPICS = [
  "daily life in Paris","a trip to the market","a conversation at a café",
  "planning a holiday","a day at work","cooking a French recipe",
  "a news story about weather","a letter to a friend","a description of a neighbourhood",
  "a story about a family reunion","talking about hobbies","a short travel diary",
];

async function generateReading() {

  readingState.loading = true;
  readingState.article = null;
  readingState.answers = {};
  readingState.checked = false;
  renderContent();

  const topic = READING_TOPICS[Math.floor(Math.random()*READING_TOPICS.length)];
  const prompt = `You are a French language teacher. Write a short French reading passage and comprehension exercise for an intermediate learner.

Topic: "${topic}"

Requirements:
- Passage: 6-8 sentences of natural everyday French. Use a mix of tenses (présent, passé composé, imparfait). Vocabulary should be practical, not literary.
- 4 comprehension questions in English with 4 multiple-choice options each
- Correct answers should require understanding the text, not just spotting words

Respond ONLY with JSON, no markdown:
{
  "title": "short French title",
  "passage": "the French text...",
  "questions": [
    {"q":"English question?","options":["A","B","C","D"],"answer":0,"exp":"brief explanation"},
    {"q":"...","options":[...],"answer":1,"exp":"..."},
    {"q":"...","options":[...],"answer":2,"exp":"..."},
    {"q":"...","options":[...],"answer":3,"exp":"..."}
  ]
}`;

  try {
    const res = await fetch(ANTHROPIC_API_URL, {
      method:'POST',
      headers: { 'Content-Type': 'application/json' },
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const text = (data.content?.[0]?.text||'').replace(/```json|```/g,'').trim();
    readingState.article = JSON.parse(text);
    readingState.loading = false;
  } catch(e) {
    readingState.loading = false;
  }
  renderContent();
}

function renderReadingHTML() {
  if (readingState.loading) {
    return `<div class="practice-screen">
      <div class="ps-header"><div class="ps-title">Lecture</div></div>
      <div class="day-panel" style="padding:2rem">
        <div class="loading-card"><div class="spinner"></div><div>Generating reading exercise…</div></div>
      </div>
    </div>`;
  }

  if (!readingState.article) {
    return `<div class="practice-screen">
      <div class="ps-header">
        <div class="ps-title">Lecture</div>
        <div class="ps-sub">Daily French reading with comprehension questions</div>
      </div>
      <div class="day-panel" style="padding:2rem;text-align:center">
        <div style="font-size:36px;margin-bottom:1rem">📖</div>
        <div style="font-size:14px;color:var(--text2);margin-bottom:6px">Read a short French passage then answer comprehension questions</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:1.5rem">Builds reading speed and comprehension — different topic every time</div>
        <button class="btn btn-primary" onclick="generateReading()">Generate reading</button>
      </div>
    </div>`;
  }

  const a = readingState.article;
  const score = readingState.checked
    ? a.questions.filter((_,i) => readingState.answers[i] === a.questions[i].answer).length
    : null;

  const qHTML = a.questions.map((q,qi) => {
    const userAns = readingState.answers[qi];
    const optHTML = q.options.map((opt,oi) => {
      let bg = 'var(--surface2)', border = 'var(--border)', col = 'var(--text)';
      if (readingState.checked) {
        if (oi === q.answer) { bg='var(--green-dim)'; border='var(--green)'; col='var(--green)'; }
        else if (oi === userAns && oi !== q.answer) { bg='var(--coral-dim)'; border='var(--coral)'; col='var(--coral)'; }
      } else if (oi === userAns) { bg='var(--blue-dim)'; border='var(--blue)'; col='var(--blue)'; }
      return `<button onclick="${readingState.checked?'':'readingState.answers['+qi+']='+oi+';renderContent()'}"
        style="text-align:left;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid ${border};
        background:${bg};color:${col};font-size:13px;cursor:${readingState.checked?'default':'pointer'};
        font-family:Inter,sans-serif;transition:all .15s;width:100%">${opt}</button>`;
    }).join('');
    return `<div style="margin-bottom:1.25rem">
      <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px">${qi+1}. ${q.q}</div>
      <div style="display:flex;flex-direction:column;gap:5px">${optHTML}</div>
      ${readingState.checked && q.exp ? `<div style="font-size:12px;color:var(--text3);font-style:italic;margin-top:6px;padding:6px 10px;background:var(--surface2);border-radius:var(--radius-sm)">💡 ${q.exp}</div>` : ''}
    </div>`;
  }).join('');

  return `<div class="practice-screen">
    <div class="ps-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div><div class="ps-title">Lecture</div><div class="ps-sub">Read · Understand · Answer</div></div>
      <button class="btn" style="font-size:12px" onclick="readingState.article=null;readingState.answers={};readingState.checked=false;renderContent()">New passage</button>
    </div>
    <div class="day-panel" style="margin-bottom:1.25rem">
      <div class="dp-header"><div class="dp-title">${a.title}</div></div>
      <div style="padding:1rem 1.25rem;font-size:14px;line-height:1.9;color:var(--text2)">${a.passage}</div>
      <div style="padding:0 1.25rem 1rem">
        <button data-speak="${a.passage}" onclick="speakFrench(this.dataset.speak)"
          style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;
          background:var(--purple-dim);border:1px solid var(--purple);color:var(--purple);
          font-size:12px;font-weight:600;font-family:Inter,sans-serif;cursor:pointer">🔊 Listen to passage</button>
      </div>
    </div>
    <div class="day-panel" style="padding:1.25rem">
      <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:1rem">Comprehension questions</div>
      ${qHTML}
      ${!readingState.checked ? `
        <button class="btn btn-primary" style="margin-top:0.5rem"
          onclick="readingState.checked=true;renderContent()"
          ${Object.keys(readingState.answers).length < a.questions.length ? 'disabled' : ''}>
          Check answers
        </button>` : `
        <div style="margin-top:1rem;padding:12px 14px;background:var(--surface2);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:15px;font-weight:500;color:${score===4?'var(--green)':score>=2?'var(--amber)':'var(--coral)'}">${score}/4 correct</div>
          <button class="btn btn-primary" style="font-size:12px" onclick="generateReading()">New passage →</button>
        </div>`}
    </div>
  </div>`;
}

// ═══════════════════════════════════════
// WEEKLY REVIEW SCREEN
// ═══════════════════════════════════════
function renderReviewHTML() {
  const ws = getWeekStart(0);
  let days = [];
  for (let i=0;i<7;i++) { let d=new Date(ws);d.setDate(d.getDate()+i);days.push(d); }

  let totalTasks=0, doneTasks=0, totalMins=0;
  const dayRows = days.map(d => {
    const tasks = getTasksForDate(d);
    const ds = state[dateKey(d)] || {};
    const done = tasks.filter(t=>ds[t.id]).length;
    totalTasks += tasks.length; doneTasks += done;
    let mins=0; tasks.forEach(t=>{if(ds[t.id]){const m=parseInt(t.time)||0;mins+=m;}});
    totalMins += mins;
    const pct = Math.round(done/tasks.length*100);
    const isToday = dateKey(d)===dateKey(today);
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border)">
      <div style="min-width:60px;font-size:13px;font-weight:500;color:${isToday?'var(--blue)':'var(--text)'}">
        ${DAYS_SHORT[d.getDay()]}${isToday?' ·':''}</div>
      <div style="flex:1"><div class="dp-bar-wrap" style="width:100%"><div class="dp-bar" style="width:${pct}%;background:${pct===100?'var(--green)':pct>50?'var(--blue)':'var(--coral)'}"></div></div></div>
      <div style="font-size:12px;color:var(--text2);min-width:50px;text-align:right">${done}/${tasks.length}</div>
      <div style="font-size:11px;color:var(--text3);min-width:40px;text-align:right">${mins}m</div>
    </div>`;
  }).join('');

  const weekPct = Math.round(doneTasks/totalTasks*100);

  // Speaking scores this week
  const speakScores = (state._speak_scores || []).filter(s=>s.ts>ws.getTime());
  const avgSpeak = speakScores.length ? Math.round(speakScores.reduce((a,b)=>a+b.score,0)/speakScores.length*20) : 0;

  // Vocab progress
  const vocabLearned = Object.keys(state._vocab || {}).length;

  return `<div class="practice-screen">
    <div class="ps-header"><div class="ps-title">Bilan de la semaine</div><div class="ps-sub">Weekly progress review</div></div>
    <div class="stats-row" style="margin-bottom:1.25rem">
      <div class="stat-card"><div class="stat-lbl">Completion</div><div class="stat-val" style="color:${weekPct>=70?'var(--green)':'var(--amber)'}">${weekPct}%</div><div class="stat-sub">this week</div></div>
      <div class="stat-card"><div class="stat-lbl">Time spent</div><div class="stat-val">${totalMins}</div><div class="stat-sub">minutes total</div></div>
      <div class="stat-card"><div class="stat-lbl">Speaking</div><div class="stat-val">${speakScores.length}</div><div class="stat-sub">sentences practiced</div></div>
      <div class="stat-card"><div class="stat-lbl">Vocab</div><div class="stat-val">${vocabLearned}</div><div class="stat-sub">words learned</div></div>
    </div>
    <div class="day-panel" style="margin-bottom:1.25rem">
      <div class="dp-header"><div class="dp-title">Daily breakdown</div></div>
      ${dayRows}
    </div>
    <div class="day-panel">
      <div class="dp-header"><div class="dp-title">Weekly notes & reflection</div></div>
      <div style="padding:1rem">
        <textarea class="notes-box" id="weeklyNotes" style="min-height:120px" placeholder="What went well this week? What grammar patterns are clicking? What needs more work? Any new words that stuck?">${state._weekly_notes || ''}</textarea>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
document.addEventListener('change', e => {
  if (e.target.id === 'weeklyNotes') { state._weekly_notes = e.target.value; saveState(state); }
});

renderNav();
renderContent();
</script>
